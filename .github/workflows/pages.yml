name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # GitHub Pages project URL (https://owlsdepartment.github.io/flyva/). Revert SITE_BASE to / and DOCS_PUBLIC_ORIGIN to https://flyva.js.org after js.org is live.
  SITE_BASE: /flyva
  DOCS_PUBLIC_ORIGIN: https://owlsdepartment.github.io/flyva

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Build landing
        run: pnpm build:landing

      - name: Build playground Next
        env:
          PLAYGROUND_BASE_PATH: ${{ env.SITE_BASE }}/playground/next
          NEXT_PUBLIC_DEMO_DOCS_HREF: ${{ env.DOCS_PUBLIC_ORIGIN }}/docs/guide/getting-started
          NEXT_PUBLIC_DEMO_GITHUB_HREF: https://github.com/owlsdepartment/flyva
        run: pnpm --filter playground-next build

      - name: Build playground Next (View Transitions)
        env:
          PLAYGROUND_BASE_PATH: ${{ env.SITE_BASE }}/playground/next-vt
          NEXT_PUBLIC_DEMO_DOCS_HREF: ${{ env.DOCS_PUBLIC_ORIGIN }}/docs/guide/getting-started
          NEXT_PUBLIC_DEMO_GITHUB_HREF: https://github.com/owlsdepartment/flyva
        run: pnpm --filter playground-next-vt build

      - name: Generate playground Nuxt
        env:
          PLAYGROUND_BASE_PATH: ${{ env.SITE_BASE }}/playground/nuxt/
          NUXT_PUBLIC_DEMO_DOCS_HREF: ${{ env.DOCS_PUBLIC_ORIGIN }}/docs/guide/getting-started
          NUXT_PUBLIC_DEMO_GITHUB_HREF: https://github.com/owlsdepartment/flyva
        run: pnpm --filter playground-nuxt generate

      - name: Generate playground Nuxt (View Transitions)
        env:
          PLAYGROUND_BASE_PATH: ${{ env.SITE_BASE }}/playground/nuxt-vt/
          NUXT_PUBLIC_DEMO_DOCS_HREF: ${{ env.DOCS_PUBLIC_ORIGIN }}/docs/guide/getting-started
          NUXT_PUBLIC_DEMO_GITHUB_HREF: https://github.com/owlsdepartment/flyva
        run: pnpm --filter playground-nuxt-vt generate

      - name: Assemble site
        run: pnpm site:assemble

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site-public

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
