name: Publish npm

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish packages
        run: |
          pnpm --filter @flyva/shared publish --access public --provenance --no-git-checks
          pnpm --filter @flyva/next publish --access public --provenance --no-git-checks
          pnpm --filter @flyva/nuxt publish --access public --provenance --no-git-checks
